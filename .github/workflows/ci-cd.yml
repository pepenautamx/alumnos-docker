name: Pipeline de Integración y Despliegue Continuo (CI/CD)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Integración Continua (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # --- backend build & test ---
      - name: Instalar dependencias del Backend
        run: |
          cd backend
          npm ci

      - name: Ejecutar pruebas del Backend
        run: |
          cd backend
          npm test

      # --- frontend build & test ---
      - name: Instalar dependencias del Frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Compilar Frontend (Angular)
        run: |
          cd frontend
          npm run build -- --configuration=production

      # --- Docker Verification ---
      - name: Validar compilación de Docker Compose
        run: |
          docker compose build
